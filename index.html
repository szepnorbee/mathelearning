<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4ECDC4">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Matek Kaland</title>
    <style>
        :root {
            --primary: #4ECDC4;
            --secondary: #FF6B6B;
            --accent: #FFE66D;
            --dark: #1A535C;
            --light: #F7FFF7;
            --bg: #E8F8F5;
            --keypad-bg: #ecf0f1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none; 
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ANIMÁCIÓK --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes popBalloon {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn { cursor: pointer; transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.8); }

        .points-badge {
            background-color: var(--accent);
            color: var(--dark);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .points-badge.bump { transform: scale(1.2); }

        main {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .view {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .view.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 0.4s ease-out;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 6px 0 var(--dark);
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
        }
        button:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--dark);
        }
        button:disabled {
            background-color: #95a5a6;
            box-shadow: 0 6px 0 #7f8c8d;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        button.op-btn { font-size: 2.5rem; }
        button.btn-red { background-color: var(--secondary); box-shadow: 0 6px 0 #c0392b; }
        button.btn-red:active:not(:disabled) { box-shadow: 0 0 0 #c0392b; }
        button.btn-accent { background-color: var(--accent); color: var(--dark); box-shadow: 0 6px 0 #d4ac0d; }
        button.btn-accent:active:not(:disabled) { box-shadow: 0 0 0 #d4ac0d; }

        /* --- FOLYAMATJELZŐ CSS --- */
        .progress-bar {
            display: flex;
            gap: 4px;
            width: 100%;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
        }
        .segment {
            flex: 1;
            height: 12px;
            background-color: #d1d8e0;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }
        .segment.correct { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .segment.incorrect { background-color: var(--secondary); box-shadow: 0 0 5px var(--secondary); }
        .segment.current { transform: scaleY(1.3); background-color: var(--primary); }

        .problem-display {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0.5rem 0;
            color: var(--dark);
        }

        /* --- SAJÁT BEVITELI MEZŐ --- */
        .answer-box {
            font-size: 2.5rem;
            padding: 0.5rem;
            width: 100%;
            height: 60px;
            text-align: center;
            border: 3px solid var(--primary);
            border-radius: 15px;
            background-color: white;
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: border-color 0.3s;
        }
        .answer-box.empty {
            color: #95a5a6;
            font-size: 1.5rem;
            font-weight: normal;
        }

        /* --- BEÉPÍTETT NUMERIKUS BILLENTYŰZET --- */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .key-btn {
            background-color: var(--keypad-bg);
            color: var(--dark);
            font-size: 2rem;
            font-weight: bold;
            padding: 0.8rem;
            border-radius: 12px;
            box-shadow: 0 4px 0 #bdc3c7;
        }
        .key-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0 0 #bdc3c7;
        }
        .key-btn.action { font-size: 1.5rem; }
        .key-btn.enter { 
            background-color: #2ecc71; 
            color: white; 
            box-shadow: 0 4px 0 #27ae60; 
        }
        .key-btn.enter:active:not(:disabled) { box-shadow: 0 0 0 #27ae60; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        /* Minijáték CSS */
        #game-area {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: white;
            border: 4px dashed var(--primary);
            border-radius: 15px;
            overflow: hidden;
        }
        .target {
            position: absolute;
            width: 65px;
            height: 75px;
            background-color: var(--secondary);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
            animation: float 2s infinite ease-in-out;
        }
        .target::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 10px solid var(--secondary);
        }
        .target.popping { animation: popBalloon 0.15s forwards; }

        .feedback {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .correct { color: #2ecc71; animation: pop 0.5s ease-in-out; }
        .incorrect { color: var(--secondary); animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <header>
        <div class="header-controls">
            <div id="back-btn" class="icon-btn" style="visibility: hidden;" onclick="navTo('menu')">🏠</div>
            <div id="sound-toggle" class="icon-btn" onclick="toggleSound()">🔊</div>
        </div>
        <div class="points-badge" id="points-container">⭐ <span id="score-display">0</span></div>
    </header>

    <main>
        <div id="view-menu" class="view active">
            <h2>Válassz feladatot!</h2>
            <div class="grid-2">
                <button class="op-btn" onclick="startPractice('add')">➕</button>
                <button class="op-btn" onclick="startPractice('sub')">➖</button>
                <button class="op-btn" onclick="startPractice('mul')">✖️</button>
                <button class="op-btn" onclick="startPractice('div')">➗</button>
            </div>
            <hr style="border-top: 3px dotted #bdc3c7; margin: 1rem 0;">
            <h2>Játéksarok</h2>
            <button class="btn-accent" onclick="openMiniGameMenu()">🎮 Lufivadászat (50 ⭐)</button>
        </div>

        <div id="view-practice" class="view">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="problem-display" id="math-problem"></div>
            
            <div id="answer-display" class="answer-box empty">?</div>
            <div id="feedback-msg" class="feedback"></div>

            <div class="keypad" id="custom-keypad">
                <button class="key-btn" onclick="inputNumber(1)">1</button>
                <button class="key-btn" onclick="inputNumber(2)">2</button>
                <button class="key-btn" onclick="inputNumber(3)">3</button>
                <button class="key-btn" onclick="inputNumber(4)">4</button>
                <button class="key-btn" onclick="inputNumber(5)">5</button>
                <button class="key-btn" onclick="inputNumber(6)">6</button>
                <button class="key-btn" onclick="inputNumber(7)">7</button>
                <button class="key-btn" onclick="inputNumber(8)">8</button>
                <button class="key-btn" onclick="inputNumber(9)">9</button>
                <button class="key-btn action" onclick="deleteNumber()">🔙</button>
                <button class="key-btn" onclick="inputNumber(0)">0</button>
                <button class="key-btn enter" onclick="checkAnswer()">✔️</button>
            </div>
        </div>

        <div id="view-summary" class="view">
            <h2>Kör vége! 🎉</h2>
            <div style="font-size: 4rem; margin: 1rem 0;">🏆</div>
            <p style="font-size: 1.2rem;">Szuperül dolgoztál!</p>
            <p style="font-size: 1.5rem; font-weight: bold; color: var(--dark);">Helyes válaszok: <span id="summary-correct" style="color: #2ecc71;">0</span> / 20</p>
            <button class="btn-accent" onclick="navTo('menu')" style="margin-top: 1rem;">Vissza a menübe</button>
        </div>

        <div id="view-minigame" class="view">
            <h2>Lufivadászat 🎈</h2>
            <p>Pukkaszd ki a lufikat, amilyen gyorsan csak tudod!</p>
            <p style="font-size: 1.2rem; font-weight: bold;">Idő: <span id="game-timer" style="color: var(--secondary);">15</span> mp</p>
            <div id="game-area"></div>
            <button class="btn-red" id="start-game-btn" onclick="startMiniGame()">Játék indítása!</button>
        </div>
    </main>

    <script>
        // --- PWA SERVICE WORKER REGISZTRÁCIÓ ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker regisztrálva!', reg))
                    .catch(err => console.log('Service Worker hiba:', err));
            });
        }

        // --- ÁLLAPOTTÉR ---
        let state = {
            points: 0,
            currentOp: null,
            correctAnswer: null,
            gameTimer: null,
            gameScore: 0,
            questionCount: 0,
            maxQuestions: 20,
            roundCorrectAnswers: 0,
            currentInput: "",
            isInputDisabled: false 
        };

        const config = {
            pointsPerCorrect: 10,
            miniGameCost: 50,
            miniGameDuration: 15
        };

        // --- Helyi Mentés (LocalStorage) Betöltése ---
        const savedPoints = localStorage.getItem('matekKalandPoints');
        if (savedPoints !== null) {
            state.points = parseInt(savedPoints, 10);
            document.getElementById('score-display').textContent = state.points;
        }

        // --- HANGKEZELÉS ---
        let audioCtx;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx && soundEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        document.body.addEventListener('touchstart', initAudio, { once: true });
        document.body.addEventListener('click', initAudio, { once: true });

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
            initAudio();
        }

        function playTone(freq, type, duration, vol = 0.1, isSlide = false) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (isSlide) osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(600, 'sine', 0.05, 0.05),
            success: () => {
                playTone(440, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(554.37, 'sine', 0.1, 0.1), 100);
                setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 200);
            },
            error: () => {
                playTone(300, 'triangle', 0.2, 0.1);
                setTimeout(() => playTone(250, 'triangle', 0.3, 0.1), 150);
            },
            pop: () => playTone(800, 'sine', 0.08, 0.2, true),
            gameOver: () => {
                playTone(400, 'square', 0.2, 0.05);
                setTimeout(() => playTone(300, 'square', 0.4, 0.05), 200);
            },
            roundWin: () => {
                playTone(523.25, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 150);
                setTimeout(() => playTone(783.99, 'sine', 0.1, 0.1), 300);
                setTimeout(() => playTone(1046.50, 'sine', 0.3, 0.1), 450);
            }
        };

        // --- NAVIGÁCIÓ ÉS UI ---
        function navTo(viewId) {
            sounds.click();
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            const backBtn = document.getElementById('back-btn');
            backBtn.style.visibility = viewId === 'menu' ? 'hidden' : 'visible';
            
            document.getElementById('feedback-msg').textContent = '';
            document.getElementById('feedback-msg').className = 'feedback';
            
            if(viewId !== 'minigame') clearInterval(state.gameTimer);
        }

        function updateScore(amount) {
            state.points += amount;
            if (state.points < 0) state.points = 0; 

            document.getElementById('score-display').textContent = state.points;
            
            // Érték mentése a LocalStorage-ba
            localStorage.setItem('matekKalandPoints', state.points);
            
            const badge = document.getElementById('points-container');
            badge.classList.remove('bump');
            void badge.offsetWidth; 
            badge.classList.add('bump');
        }

        // --- SAJÁT BILLENTYŰZET LOGIKA ---
        function updateInputDisplay() {
            const display = document.getElementById('answer-display');
            if (state.currentInput === "") {
                display.textContent = "?";
                display.classList.add('empty');
            } else {
                display.textContent = state.currentInput;
                display.classList.remove('empty');
            }
        }

        function inputNumber(num) {
            if (state.isInputDisabled) return;
            if (state.currentInput.length < 3) {
                sounds.click();
                state.currentInput += num.toString();
                updateInputDisplay();
            }
        }

        function deleteNumber() {
            if (state.isInputDisabled) return;
            if (state.currentInput.length > 0) {
                sounds.click();
                state.currentInput = state.currentInput.slice(0, -1);
                updateInputDisplay();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById('view-practice').classList.contains('active') && !state.isInputDisabled) {
                if (e.key >= '0' && e.key <= '9') {
                    inputNumber(e.key);
                } else if (e.key === 'Backspace') {
                    deleteNumber();
                } else if (e.key === 'Enter') {
                    checkAnswer();
                }
            }
        });

        // --- FOLYAMATJELZŐ ÉS MATEMATIKAI LOGIKA ---
        function initProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.innerHTML = '';
            for(let i = 0; i < state.maxQuestions; i++) {
                const seg = document.createElement('div');
                seg.className = 'segment';
                bar.appendChild(seg);
            }
            updateProgressBarUI();
        }

        function updateProgressBarUI() {
            const segments = document.querySelectorAll('.segment');
            segments.forEach((seg, index) => {
                seg.classList.remove('current');
                if (index === state.questionCount) {
                    seg.classList.add('current');
                }
            });
        }

        function generateProblem(op) {
            let a, b, answer, symbol;
            switch(op) {
                case 'add':
                    a = Math.floor(Math.random() * 75) + 15; 
                    let maxB = 100 - a;
                    let minB = (maxB > 10) ? 8 : maxB;
                    b = Math.floor(Math.random() * (maxB - minB + 1)) + minB;
                    answer = a + b;
                    symbol = '+';
                    break;
                case 'sub':
                    if (Math.random() < 0.6) { 
                        let onesA = Math.floor(Math.random() * 5) + 1;
                        let onesB = Math.floor(Math.random() * 4) + onesA + 1;
                        let tensA = Math.floor(Math.random() * 7) + 3;
                        a = tensA * 10 + onesA;
                        
                        if (Math.random() < 0.5) {
                            b = onesB;
                        } else {
                            let tensB = Math.floor(Math.random() * (tensA - 1)) + 1;
                            b = tensB * 10 + onesB;
                        }
                    } else {
                        a = Math.floor(Math.random() * 50) + 40;
                        b = Math.floor(Math.random() * (a - 20)) + 11;
                    }
                    answer = a - b;
                    symbol = '-';
                    break;
                case 'mul':
                    a = Math.floor(Math.random() * 9) + 2;
                    b = Math.floor(Math.random() * 9) + 2;
                    answer = a * b;
                    symbol = '×';
                    break;
                case 'div':
                    b = Math.floor(Math.random() * 9) + 2;
                    answer = Math.floor(Math.random() * 9) + 2;
                    a = b * answer;
                    symbol = '÷';
                    break;
            }
            state.correctAnswer = answer;
            
            const problemEl = document.getElementById('math-problem');
            problemEl.style.opacity = 0;
            setTimeout(() => {
                problemEl.textContent = `${a} ${symbol} ${b} = ?`;
                problemEl.style.transition = "opacity 0.3s";
                problemEl.style.opacity = 1;
            }, 100);
            
            updateProgressBarUI();
        }

        function startPractice(op) {
            state.currentOp = op;
            state.questionCount = 0;
            state.roundCorrectAnswers = 0;
            
            state.currentInput = "";
            updateInputDisplay();
            state.isInputDisabled = false;
            
            initProgressBar();
            generateProblem(op);
            navTo('practice');
        }

        function setKeypadState(disabled) {
            state.isInputDisabled = disabled;
            const buttons = document.querySelectorAll('#custom-keypad .key-btn');
            buttons.forEach(btn => btn.disabled = disabled);
        }

        function checkAnswer() {
            if (state.isInputDisabled) return;

            const feedbackEl = document.getElementById('feedback-msg');
            const userAnswer = parseInt(state.currentInput, 10);
            
            const segments = document.querySelectorAll('.segment');
            const currentSeg = segments[state.questionCount];

            feedbackEl.className = 'feedback';
            void feedbackEl.offsetWidth;

            if (isNaN(userAnswer)) {
                feedbackEl.textContent = 'Kérlek írj be egy számot!';
                feedbackEl.className = 'feedback incorrect';
                sounds.error();
                return;
            }

            setKeypadState(true);

            if (userAnswer === state.correctAnswer) {
                sounds.success();
                updateScore(config.pointsPerCorrect);
                state.roundCorrectAnswers++;
                feedbackEl.textContent = 'Ragyogó! +10 ⭐';
                feedbackEl.className = 'feedback correct';
                currentSeg.classList.add('correct');
            } else {
                sounds.error();
                feedbackEl.innerHTML = `Hoppá! A helyes válasz: <b>${state.correctAnswer}</b> volt.`;
                feedbackEl.className = 'feedback incorrect';
                currentSeg.classList.add('incorrect');
            }

            state.questionCount++;

            setTimeout(() => {
                state.currentInput = "";
                updateInputDisplay();
                feedbackEl.textContent = '';
                
                if (state.questionCount < state.maxQuestions) {
                    generateProblem(state.currentOp);
                    setKeypadState(false); 
                } else {
                    setKeypadState(false);
                    endPracticeRound();
                }
            }, 2000); 
        }

        function endPracticeRound() {
            sounds.roundWin();
            document.getElementById('summary-correct').textContent = state.roundCorrectAnswers;
            navTo('summary');
        }

        // --- MINIJÁTÉK LOGIKA ---
        function openMiniGameMenu() {
            if (state.points < config.miniGameCost) {
                sounds.error();
                const btn = event.currentTarget;
                btn.style.animation = 'none';
                void btn.offsetWidth;
                btn.style.animation = 'shake 0.4s ease-in-out';
                alert(`Még ${config.miniGameCost - state.points} csillag kell a játékhoz!`);
                return;
            }
            document.getElementById('game-area').innerHTML = '';
            document.getElementById('start-game-btn').style.display = 'block';
            document.getElementById('game-timer').textContent = config.miniGameDuration;
            navTo('minigame');
        }

        function startMiniGame() {
            if (state.points < config.miniGameCost) {
                sounds.error();
                alert(`Nincs elég csillagod az újrajátszáshoz! Kérlek, gyakorolj még, hogy gyűjts párat!`);
                navTo('menu');
                return;
            }

            updateScore(-config.miniGameCost);
            state.gameScore = 0;
            
            const btn = document.getElementById('start-game-btn');
            btn.style.display = 'none';
            
            let timeLeft = config.miniGameDuration;
            document.getElementById('game-timer').textContent = timeLeft;
            
            spawnTarget();

            state.gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('game-timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(state.gameTimer);
                    endMiniGame();
                }
            }, 1000);
        }

        function spawnTarget() {
            const area = document.getElementById('game-area');
            const target = document.createElement('div');
            target.className = 'target';
            
            const faces = ['😀', '😎', '🤩', '👻'];
            target.textContent = faces[Math.floor(Math.random() * faces.length)];
            
            const maxX = area.clientWidth - 75;
            const maxY = area.clientHeight - 85;
            
            target.style.left = Math.floor(Math.random() * maxX) + 'px';
            target.style.top = Math.floor(Math.random() * maxY) + 'px';
            target.style.animationDelay = `-${Math.random() * 2}s`;
            
            const handleHit = (e) => {
                e.preventDefault();
                target.removeEventListener('touchstart', handleHit);
                target.removeEventListener('mousedown', handleHit);
                
                sounds.pop();
                target.classList.add('popping');
                state.gameScore++;
                
                setTimeout(() => {
                    target.remove();
                    spawnTarget();
                }, 150); 
            };

            target.addEventListener('touchstart', handleHit, {passive: false});
            target.addEventListener('mousedown', handleHit);
            
            area.appendChild(target);
        }

        function endMiniGame() {
            sounds.gameOver();
            const area = document.getElementById('game-area');
            area.innerHTML = `
                <div style="padding-top: 80px; text-align: center; animation: fadeIn 0.5s;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🏆</div>
                    <div style="font-size: 1.8rem; font-weight: bold; color: var(--dark);">Lejárt az idő!</div>
                    <div style="font-size: 1.2rem; margin-top: 10px;">Kipukkasztott lufik: <b style="color: var(--secondary); font-size: 1.5rem;">${state.gameScore}</b></div>
                </div>`;
            const btn = document.getElementById('start-game-btn');
            btn.style.display = 'block';
            btn.textContent = 'Újra játszom (50 ⭐)';
        }
    </script>
</body>
</html>
